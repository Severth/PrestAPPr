<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestAPPr - Detalle de Préstamo</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/theme.js"></script>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        .loan-header-card {
            background: linear-gradient(135deg, var(--card), var(--bg));
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
        }
        .loan-header-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--primary);
            opacity: 0.05;
            border-radius: 50%;
        }
        .cuota-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cuota-card:hover {
            transform: translateY(-2px);
            background: var(--bg);
        }
        .cuota-number {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
        }
        .badge-status {
            padding: 0.35rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <nav class="nav">
        <span class="nav-brand">💰 PrestAPPr Pro</span>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="clientes.html" class="nav-link">Clientes</a>
            <a href="nuevo-credito.html" class="nav-link">+ Préstamo</a>
            <button class="nav-link" onclick="api.logout()" style="background:transparent; border:none; cursor:pointer; color:var(--danger); font-weight:700;"> Salir 🚪</button>
            <button id="theme-toggle" class="btn btn-sm" style="background:transparent; border:none; font-size:1.2rem;" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <div class="container" style="padding-top: 2rem; padding-bottom: 6rem;">
        
        <div id="main-content">
            <div class="spinner" style="margin: 5rem auto;"></div>
        </div>

    </div>

    <!-- Modal Pago Avanzado -->
    <div id="modal-pago-overlay"
        style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.8); backdrop-filter:blur(8px); z-index:200; align-items:center; justify-content:center;"
        onmousedown="cerrarModalPago(event)">
        <div class="modal-content" style="background:var(--card); border-radius:1.5rem; padding:2rem; width:100%; max-width:520px; border:1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <h2 style="font-size:1.4rem; font-weight:800; margin-bottom:1.5rem; letter-spacing:-0.5px;">Registrar Recaudo</h2>
            <form id="form-pago" class="space-y" onsubmit="enviarPago(event)">
                <input type="hidden" id="pago_cuota_id">

                <div class="form-group">
                    <label class="label">Concepto de Recepción</label>
                    <select id="pago_tipo" class="select" required style="font-weight:600;" onchange="toggleCustomCapital()">
                        <option value="completo">Pago Completo (Capital + Interés)</option>
                        <option value="interes">Solo Intereses (Alarga 1 mes)</option>
                        <option value="capital">Abono Personalizado</option>
                    </select>
                </div>

                <div class="form-group" id="group-capital-abonado" style="display:none; background: var(--bg); padding:1.2rem; border-radius:.75rem; border: 1px dashed var(--primary); margin-top:0.5rem;">
                    <label class="label" style="color:var(--primary);">Abono Exacto a Capital *</label>
                    <input type="text" id="pago_capital_abonado" class="input" style="background:var(--card); font-size:1.1rem; border:1px solid var(--border);" placeholder="Ej. 100.000" oninput="formatearMonedaModal(this)">
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="label">Método de Pago</label>
                        <select id="pago_metodo" class="select" required>
                            <option value="Efectivo">Efectivo Físico</option>
                            <option value="Transferencia">Transferencia Bancaria</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="label">Cobrador</label>
                        <input type="text" id="pago_cobrador" class="input" placeholder="Nombre">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="label">Cuenta Origen (Cliente)</label>
                        <input type="text" id="pago_origen" class="input" placeholder="Ej. Bancolombia">
                    </div>
                    <div class="form-group">
                        <label class="label">Cuenta Destino</label>
                        <input type="text" id="pago_destino" class="input" placeholder="Ej. Nequi">
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-block mt-2" style="height:54px; font-size:1.1rem;" id="btn-submit-pago">Confirmar Ingreso</button>
            </form>
        </div>
    </div>

    <!-- ══ BOTTOM NAV (MOBILE) ══ -->
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="index.html" class="bottom-nav-link">
                <span class="icon">📊</span>
                <span>Resumen</span>
            </a>
            <a href="clientes.html" class="bottom-nav-link">
                <span class="icon">👥</span>
                <span>Clientes</span>
            </a>
            <a href="nuevo-credito.html" class="bottom-nav-link" style="width:auto;">
                <div class="bottom-nav-fab"><span>+</span></div>
            </a>
            <a href="solicitud.html" target="_blank" class="bottom-nav-link">
                <span class="icon">🔗</span>
                <span>Público</span>
            </a>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script>
        const fmt = (n) => '$' + parseFloat(n || 0).toLocaleString('es-CO', { minimumFractionDigits: 0 });
        const params = new URLSearchParams(window.location.search);
        const prestamoId = params.get('id');

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast toast-${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function cargarPrestamo() {
            if (!prestamoId) {
                document.getElementById('main-content').innerHTML = '<div class="empty-state">⚠️ Sin ID de préstamo.</div>';
                return;
            }
            try {
                const p = await api.getPrestamo(prestamoId);
                renderPrestamo(p);
            } catch (e) {
                document.getElementById('main-content').innerHTML = '<div class="empty-state">⚠️ Error cargando préstamo.</div>';
            }
        }

        function renderPrestamo(p) {
            const statusMap = { 'Activo': 'badge-primary', 'Finalizado': 'badge-success', 'Mora': 'badge-danger' };
            const pagadas = p.cuotas.filter(c => c.estado === 'Pagado').length;
            const progreso = p.cuotas.length > 0 ? Math.round((pagadas / p.cuotas.length) * 100) : 0;
            
            const saldoTotalAdeudado = p.cuotas.reduce((acc, c) => {
                return (c.estado === 'Pendiente' || c.estado === 'Mora' || c.estado === 'Abono_interes') ? acc + (c.monto_cuota || 0) : acc;
            }, 0);

            document.getElementById('main-content').innerHTML = `
                <div class="loan-header-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <span class="badge-status ${statusMap[p.estado] || 'badge-primary'}" style="margin-bottom:1rem; display:inline-block;">${p.estado}</span>
                            <h1 style="font-size:2.2rem; font-weight:900; letter-spacing:-1px; margin-bottom:0.25rem;">${fmt(saldoTotalAdeudado)}</h1>
                            <div class="text-muted" style="font-weight:600; font-size:0.9rem; text-transform:uppercase; letter-spacing:1px;">Deuda Remanente</div>
                            
                            <div style="margin-top:1.5rem; display:flex; align-items:center; gap:0.75rem;">
                                <div style="background:var(--primary); width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">👤</div>
                                <div>
                                    <div style="font-weight:800; font-size:1.1rem; color:var(--text);">${p.nombre_completo}</div>
                                    <div class="text-muted" style="font-size:0.85rem;">${p.telefono}</div>
                                </div>
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <div class="text-muted" style="font-size:0.8rem;">Monto Original</div>
                            <div style="font-weight:800; font-size:1.2rem;">${fmt(p.monto)}</div>
                            <div class="text-muted" style="font-size:0.8rem; margin-top:0.75rem;">Tasa Mensual</div>
                            <div style="font-weight:800; font-size:1.2rem;">${p.tasa_interes_anual / 12}%</div>
                        </div>
                    </div>

                    <div style="margin-top:2.5rem;">
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:0.5rem; font-weight:700;">
                            <span class="text-muted">Progreso del plan</span>
                            <span style="color:var(--success);">${progreso}%</span>
                        </div>
                        <div style="background:rgba(255,255,255,0.05); height:12px; border-radius:10px; border:1px solid var(--border);">
                            <div style="background:linear-gradient(90deg, var(--success), #34d399); width:${progreso}%; height:100%; border-radius:10px; transition:width 1s ease;"></div>
                        </div>
                    </div>

                    <div style="margin-top:2rem; display:flex; gap:1rem;">
                        <a href="tel:${p.telefono}" class="btn btn-outline" style="flex:1; height:48px;">Llamar</a>
                        <a href="https://wa.me/57${p.telefono.replace(/\D/g, '')}" target="_blank" class="btn btn-success" style="flex:1; height:48px; background:#25D366; border:none;">WhatsApp</a>
                    </div>
                </div>

                <h2 style="font-size:1.2rem; font-weight:800; margin-bottom:1.25rem; display:flex; align-items:center; gap:0.5rem;">
                    <span>📅</span> Cronograma de Pagos
                </h2>

                <div class="space-y">
                    ${p.cuotas.map(c => `
                        <div class="card cuota-card ${c.estado === 'Pagado' ? 'opacity-50' : ''}">
                            <div style="display:flex; align-items:center; gap:1rem;">
                                <div class="cuota-number" style="background:${c.estado === 'Pagado' ? 'var(--success)' : 'var(--primary)'}; color:white;">
                                    ${c.estado === 'Pagado' ? '✓' : c.numero_cuota}
                                </div>
                                <div style="flex:1;">
                                    <div style="font-weight:800; font-size:1.1rem; letter-spacing:-0.2px;">${fmt(c.monto_cuota)}</div>
                                    <div class="text-muted" style="font-size:0.8rem;">
                                        Vence: <strong>${new Date(c.fecha_vencimiento).toLocaleDateString('es-CO', { day:'numeric', month:'short' })}</strong> 
                                        · Cap: ${fmt(c.capital)} · Int: ${fmt(c.interes)}
                                    </div>
                                </div>
                                <div>
                                    ${c.estado === 'Pendiente' ? `
                                        <button class="btn btn-success btn-sm" onclick="abrirModalPago(${c.id})">Cobrar</button>
                                    ` : `<span class="badge-status badge-success">${c.estado.replace('_', ' ')}</span>`}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function abrirModalPago(cuotaId) {
            document.getElementById('pago_cuota_id').value = cuotaId;
            document.getElementById('pago_tipo').value = 'completo';
            document.getElementById('pago_capital_abonado').value = '';
            toggleCustomCapital();
            document.getElementById('modal-pago-overlay').style.display = 'flex';
        }

        function toggleCustomCapital() {
            const tipo = document.getElementById('pago_tipo').value;
            const group = document.getElementById('group-capital-abonado');
            group.style.display = tipo === 'capital' ? 'block' : 'none';
        }

        function cerrarModalPago(e) {
            if (e && e.target.id !== 'modal-pago-overlay') return;
            document.getElementById('modal-pago-overlay').style.display = 'none';
        }

        async function enviarPago(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-pago');
            btn.disabled = true; btn.textContent = 'Procesando...';
            
            const id = document.getElementById('pago_cuota_id').value;
            const capitalStr = document.getElementById('pago_capital_abonado').value.replace(/\D/g, '');
            const data = {
                tipo: document.getElementById('pago_tipo').value,
                metodo: document.getElementById('pago_metodo').value,
                cobrador: document.getElementById('pago_cobrador').value,
                cuenta_origen: document.getElementById('pago_origen').value,
                cuenta_destino: document.getElementById('pago_destino').value,
                capital_abonado: capitalStr ? parseInt(capitalStr) : null
            };

            try {
                await api.pagarCuota(id, data);
                showToast('✅ Pago registrado con éxito');
                cerrarModalPago({ target: { id: 'modal-pago-overlay' } });
                cargarPrestamo();
            } catch (err) {
                showToast('Error al registrar pago', 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Confirmar Ingreso';
            }
        }

        function formatearMonedaModal(input) {
            let v = input.value.replace(/\D/g, '');
            input.value = v ? parseInt(v).toLocaleString('es-CO') : '';
        }

        cargarPrestamo();
    </script>
</body>
</html>
