<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PrestAPPr</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/theme.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            margin: 0;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .login-btn {
            height: 54px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        [data-theme="dark"] .login-card {
            background: rgba(30, 41, 59, 0.7);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">💰</div>
            <h1 class="login-title">PrestAPPr Pro</h1>
            <p class="login-subtitle">Panel de Administración de Cartera</p>
        </div>

        <div id="login-error" class="error-message"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="label">Correo Electrónico</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="input" required placeholder="tu@correo.com" style="padding-left: 1rem;">
                </div>
            </div>

            <div class="form-group">
                <label class="label">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="input" required placeholder="••••••••" style="padding-left: 1rem;">
                </div>
            </div>

            <button type="submit" id="btn-login" class="btn btn-primary btn-block login-btn">
                Entrar al Sistema
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem;">
            <p class="text-muted" style="font-size: 0.8rem;">© 2026 PrestAPPr — Gestión Eficiente</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Si ya hay token, intentamos ir al dashboard
        if (api.getToken()) {
            window.location.href = 'index.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');

            btn.disabled = true;
            btn.textContent = 'Autenticando...';
            errorDiv.style.display = 'none';

            try {
                await api.login(email, password);
                window.location.href = 'index.html';
            } catch (err) {
                errorDiv.textContent = err.error || 'Error de conexión con el servidor';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Entrar al Sistema';
            }
        }
    </script>
</body>

</html>
